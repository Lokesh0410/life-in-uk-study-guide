[dev]
command = "npm start"
port = 8888
targetPort = 3000
functions = "netlify/functions"

[build]
command = "npm run build"
publish = "build"
functions = "netlify/functions"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
